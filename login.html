<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Financeiro do Casal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="modal" style="position: static; min-height: 100vh; background: linear-gradient(180deg, #eef4ff 0%, #f8fafc 40%, #f4f7fb 100%);">
    <div class="modal-content" style="max-width: 460px;">
      <div class="panel-header">
        <span class="badge" style="background: rgba(29, 78, 216, 0.12); color: #1d4ed8;">🔐 Área de login</span>
        <h2>Entrar no sistema</h2>
        <p>Acesse o painel financeiro com seu e-mail e senha.</p>
      </div>

      <form id="auth-form" class="form-grid" style="grid-template-columns: 1fr;">
        <div class="field">
          <label for="email">E-mail</label>
          <input type="email" id="email" required placeholder="seuemail@exemplo.com" />
        </div>

        <div class="field">
          <label for="password">Senha</label>
          <input type="password" id="password" required minlength="6" placeholder="Digite sua senha" />
        </div>

        <button id="submit-btn" type="submit" class="btn-primary">Entrar</button>
      </form>

      <div class="modal-actions" style="margin-top: 12px; justify-content: stretch;">
        <button id="tab-login" type="button" class="btn-light" style="flex: 1;">Modo login</button>
        <button id="tab-register" type="button" class="btn-secondary" style="flex: 1;">Criar conta</button>
      </div>

      <p id="auth-message" style="margin-top: 14px; color: #6b7280; font-size: 14px;"></p>
    </div>
  </main>

  <script type="module" src="login.js"></script>
</body>
</html>
